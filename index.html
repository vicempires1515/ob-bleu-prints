<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Premium print-on-demand gear for builders, contractors, and blue-collar operators. Shop OB Bleu-Prints on Etsy.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
      text-align: center;
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #00d4ff, #ff2d95);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 2.5rem;
      font-weight: 400;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 100px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 2rem;
    }
    .etsy-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #f56400;
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.05rem;
      transition: background 0.2s;
    }
    .etsy-link:hover { background: #d95500; }
    .etsy-link svg { width: 20px; height: 20px; fill: currentColor; }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #555;
    }
    .footer a { color: #00d4ff; text-decoration: none; }
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #00d4ff, #ff2d95);
      margin: 1.5rem auto;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">OB BLEU-PRINTS</div>
    <div class="divider"></div>
    <p class="tagline">Gear for the Ones Who<br>Actually Build Things</p>
    <div class="badge">📍 Titusville, PA</div>
    <br>
    <a class="etsy-link" href="https://www.etsy.com/shop/OB-Bleu-Prints" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
      Shop on Etsy
    </a>
    <footer class="footer">
      <p>OB Investments LLC &bull; Titusville, PA</p>
      <p style="margin-top: 0.5rem;">Questions? <a href="mailto:vicempires1515@gmail.com">vicempires1515@gmail.com</a></p>
    </footer>
