<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etsy Authorization — OB Bleu-Prints</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: #12121a;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a3e;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="status-processing">
      <div class="spinner"></div>
      <h1>Redirecting…</h1>
      <p>Forwarding your Etsy authorization code to the local server.</p>
    </div>

    <div id="status-no-code" class="hidden">
      <div class="fail-icon">🔗</div>
      <h1>No Authorization Code</h1>
      <p>This page received no authorization code. It should only be reached after approving the Etsy app.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const forward = params.get('state');

    if (code && forward) {
      // No CORS issues — browser redirects directly to the tunnel
      window.location.href = forward + '?code=' + encodeURIComponent(code);
    } else {
      document.getElementById('status-processing').classList.add('hidden');
      document.getElementById('status-no-code').classList.remove('hidden');
    }
  </script>
</body>
</html>
